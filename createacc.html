<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Japan Life Guide</title>

    <link rel="stylesheet" href="../css/createacc.css">
</head>
<body>

<div class="background"></div>

<div class="login-container signup-container">

    <div class="logo">
        <img src="../img/Japan.png" width="100px">
    </div>

    <h1 id="title">Create Account</h1>

    <p class="subtitle"  id="subtitle">
        Join Japan Life Guide and start your journey in Japan.
    </p>

    <form id="signupForm">

        <div class="input-group">
            <label id="nameLabel">Full Name</label>
            <input type="text" id="name" placeholder="Your Name" required>
        </div>

        <div class="input-group">
            <label id="emailLabel">Email Address</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="input-group">
            <label id="passwordLabel">Password</label>
            <input type="password" id="password" placeholder="********" required>
        </div>

        <div class="input-group">
            <label id="confirmPasswordLabel">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="********" required>
        </div>

        <div class="input-group">
            <label id="nationalityLabel">Nationality</label>
            <select id="nationality" required>
                <option value="">Select Nationality</option>
                <option>Myanmar</option>
                <option>Vietnam</option>
                <option>Nepal</option>
                <option>China</option>
                <option>India</option>
                <option>Indonesia</option>
                <option>Philippines</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-group">
            <label id="visaLabel">Visa Type</label>
            <select id="visa" required>
                <option value="">Select Visa Type</option>
                <option>Student Visa</option>
                <option>Work Visa</option>
                <option>Family Stay Visa</option>
                <option>Specified Skilled Worker</option>
                <option>Permanent Resident</option>
            </select>
        </div>

        <button type="submit" class="signup-btn" id="createBtn">
            Create Account
        </button>

    </form>

    <p id="signupMessage"></p>

    <div class="divider">
        <span>OR</span>
    </div>

    <button
        class="login-btn"
        onclick="location.href='loginpage.html'" id="backBtn">
        Back to Login
    </button>

</div>

<script src="../js/createacc.js"></script>

</body>
</html>
